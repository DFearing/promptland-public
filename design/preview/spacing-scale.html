<!DOCTYPE html>
<html lang="en" data-theme="mud">
<head>
<meta charset="utf-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 16px; background: var(--bg-0); font-family: var(--font-mono); font-size: 11px; }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .row .name { width: 60px; color: var(--fg-3); font-family: var(--font-display); font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase; }
  .row .bar { background: var(--fg-2); height: 12px; box-shadow: var(--glow-sm); }
  .row .px { color: var(--fg-3); width: 44px; text-align: right; }
</style>
</head>
<body>
<div class="row"><span class="name">sp-1</span><span class="bar" style="width:4px"></span><span class="px">4</span></div>
<div class="row"><span class="name">sp-2</span><span class="bar" style="width:8px"></span><span class="px">8</span></div>
<div class="row"><span class="name">sp-3</span><span class="bar" style="width:12px"></span><span class="px">12</span></div>
<div class="row"><span class="name">sp-4</span><span class="bar" style="width:16px"></span><span class="px">16</span></div>
<div class="row"><span class="name">sp-5</span><span class="bar" style="width:20px"></span><span class="px">20</span></div>
<div class="row"><span class="name">sp-6</span><span class="bar" style="width:24px"></span><span class="px">24</span></div>
<div class="row"><span class="name">sp-7</span><span class="bar" style="width:32px"></span><span class="px">32</span></div>
<div class="row"><span class="name">sp-8</span><span class="bar" style="width:48px"></span><span class="px">48</span></div>
<div class="row"><span class="name">sp-9</span><span class="bar" style="width:64px"></span><span class="px">64</span></div>
</body>
</html>
