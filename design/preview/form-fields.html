<!DOCTYPE html>
<html lang="en" data-theme="mud">
<head>
<meta charset="utf-8">
<title>Form fields</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 16px; background: var(--bg-0); font-family: var(--font-mono); }
  .field { margin-bottom: 10px; }
  .k { font-family: var(--font-display); font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-2); display:block; margin-bottom: 4px;}
  input, select {
    width: 100%;
    background: var(--bg-inset);
    color: var(--fg-1);
    border: 1px solid var(--line-1);
    box-shadow: var(--shadow-inset);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 7px 9px;
    outline: none;
  }
  input:focus { border-color: var(--line-3); box-shadow: inset 0 0 0 1px var(--line-3), var(--glow-sm); }
  .check { display: flex; align-items: center; gap: 8px; color: var(--fg-1); font-size: 13px;}
  .ascii { font-family: var(--font-mono); color: var(--accent); }
</style>
</head>
<body>
<div class="field">
  <label class="k">Base URL</label>
  <input type="text" value="https://api.openai.com/v1" />
</div>
<div class="field">
  <label class="k">Model</label>
  <input type="text" value="gpt-4o-mini" />
</div>
<div style="display:flex; gap:16px;">
  <label class="check"><span class="ascii">[x]</span> Persist locally</label>
  <label class="check"><span class="ascii">[ ]</span> Stream tokens</label>
  <label class="check"><span class="ascii">[-]</span> Verbose</label>
</div>
</body>
</html>
