<!DOCTYPE html>
<html lang="en" data-theme="mud">
<head>
<meta charset="utf-8">
<title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 16px; background: var(--bg-0); }
  .wrap { border: 1px solid var(--line-2); padding: 14px 18px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 6px; }
  .spec { font-family: var(--font-display); color: var(--accent-hot); text-shadow: var(--glow-sm); line-height: 1.1; }
  .s1 { font-size: 48px; }
  .s2 { font-size: 36px; color: var(--fg-1); }
  .s3 { font-size: 28px; color: var(--fg-2); text-shadow: none; }
  hr.divide { border: none; border-top: 1px dashed var(--line-1); margin: 10px 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="meta">VT323 · display · 48 / 36 / 28</div>
  <div class="spec s1">UNDERSTUDY</div>
  <hr class="divide">
  <div class="spec s2">Fenra is dead.</div>
  <hr class="divide">
  <div class="spec s3">THE SUNKEN CHAPEL</div>
</div>
</body>
</html>
