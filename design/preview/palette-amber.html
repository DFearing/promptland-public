<!DOCTYPE html>
<html lang="en" data-theme="amber">
<head>
<meta charset="utf-8">
<title>Palette — Amber</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 16px; background: var(--bg-0); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .sw { height: 96px; border: 1px solid var(--line-2); padding: 8px; display: flex; flex-direction: column; justify-content: space-between; font-family: var(--font-mono); font-size: 10px;}
  .sw .name { font-family: var(--font-display); font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase; }
  .sw .hex { color: var(--fg-3); }
</style>
</head>
<body>
<div class="grid">
  <div class="sw" style="background:var(--bg-0);"><span class="name" style="color:var(--fg-1)">bg-0</span><span class="hex" style="color:var(--fg-2)">#0a0704</span></div>
  <div class="sw" style="background:var(--bg-1);"><span class="name" style="color:var(--fg-1)">bg-1</span><span class="hex" style="color:var(--fg-2)">#140d05</span></div>
  <div class="sw" style="background:var(--bg-2);"><span class="name" style="color:var(--fg-1)">bg-2</span><span class="hex" style="color:var(--fg-2)">#1c1208</span></div>
  <div class="sw" style="background:var(--bg-3);"><span class="name" style="color:var(--fg-1)">bg-3</span><span class="hex" style="color:var(--fg-2)">#28190b</span></div>
  <div class="sw" style="background:var(--bg-1);"><span class="name" style="color:var(--accent-hot)">accent-hot</span><span class="hex">#ffe0a8</span></div>
  <div class="sw" style="background:var(--bg-1);"><span class="name" style="color:var(--fg-1)">fg-1</span><span class="hex">#ffcc66</span></div>
  <div class="sw" style="background:var(--bg-1);"><span class="name" style="color:var(--fg-2)">fg-2</span><span class="hex">#d99a3d</span></div>
  <div class="sw" style="background:var(--bg-1);"><span class="name" style="color:var(--fg-3)">fg-3</span><span class="hex">#8c6322</span></div>
  <div class="sw" style="background:var(--bg-1);"><span class="name" style="color:var(--fg-dim)">fg-dim</span><span class="hex">#3d2d11</span></div>
  <div class="sw" style="background:var(--bg-1);"><span class="name" style="color:var(--accent)">accent</span><span class="hex">#ffb347</span></div>
</div>
</body>
</html>
