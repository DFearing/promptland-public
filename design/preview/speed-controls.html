<!DOCTYPE html>
<html lang="en" data-theme="mud">
<head>
<meta charset="utf-8">
<title>Speed controls</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 16px; background: var(--bg-0); display: flex; justify-content: center; align-items: center; min-height: 80%; }
  .speed {
    display: inline-flex;
    border: 1px solid var(--line-2);
    background: var(--bg-1);
    font-family: var(--font-display);
    font-size: 22px;
    letter-spacing: 0.05em;
  }
  .speed button {
    background: transparent;
    border: none;
    color: var(--fg-3);
    padding: 6px 14px;
    border-right: 1px solid var(--line-1);
    cursor: pointer;
    font-family: inherit;
    font-size: inherit;
  }
  .speed button:last-child { border-right: none; }
  .speed button.active {
    background: var(--bg-3);
    color: var(--accent-hot);
    text-shadow: var(--glow-sm);
  }
  .speed button:hover:not(.active) { color: var(--fg-1); }
</style>
</head>
<body>
<div class="speed">
  <button>⏸</button>
  <button class="active">1×</button>
  <button>2×</button>
  <button>4×</button>
</div>
</body>
</html>
