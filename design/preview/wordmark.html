<!DOCTYPE html>
<html lang="en" data-theme="mud">
<head>
<meta charset="utf-8">
<title>Wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 16px; background: var(--bg-0); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 16px; min-height: 80%; }
  .wrap { color: var(--accent-hot); filter: drop-shadow(0 0 6px rgba(168, 255, 176, 0.35)); }
  .mark { color: var(--fg-1); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.14em;}
</style>
</head>
<body>
<div class="wrap"><img src="../assets/logo/promptland-wordmark.svg" alt="Promptland" width="420"></div>
<div style="display:flex;gap:24px;align-items:center;">
  <div class="mark"><img src="../assets/logo/promptland-mark.svg" alt="U" width="48"></div>
  <div class="lbl">wordmark · mark</div>
</div>
</body>
</html>
