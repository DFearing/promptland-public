<!DOCTYPE html>
<html lang="en" data-theme="mud">
<head>
<meta charset="utf-8">
<title>Panels</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 16px; background: var(--bg-0); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .panel { background: var(--bg-1); border: 1px solid var(--line-2); padding: 12px 14px; }
  .header { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid var(--line-1); padding-bottom: 6px; margin-bottom: 10px; }
  .title { font-family: var(--font-display); font-size: 18px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-2); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.12em;}
  .body { font-family: var(--font-body); font-size: 13px; color: var(--fg-1); line-height: 1.6;}
  .inset { background: var(--bg-inset); border: 1px solid var(--line-1); box-shadow: var(--shadow-inset); padding: 8px 10px; font-family: var(--font-mono); font-size: 12px; color: var(--fg-2);}
</style>
</head>
<body>
<div class="grid">
  <div class="panel">
    <div class="header"><span class="title">Sheet</span><span class="meta">lvl 4</span></div>
    <div class="body">A ranger, raised quiet. Prefers the forest's edge to its center.</div>
  </div>
  <div class="panel">
    <div class="header"><span class="title">Inset field</span><span class="meta">sunken</span></div>
    <div class="inset">&gt; she listens before she moves.</div>
  </div>
</div>
</body>
</html>
