<!DOCTYPE html>
<html lang="en" data-theme="mud">
<head>
<meta charset="utf-8">
<title>Type — Body</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 16px; background: var(--bg-0); }
  .wrap { border: 1px solid var(--line-2); padding: 14px 18px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 10px; }
  p { margin: 0 0 6px 0; color: var(--fg-1); font-size: 14px; line-height: 1.65; }
  .dim { color: var(--fg-3); }
</style>
</head>
<body>
<div class="wrap">
  <div class="meta">IBM Plex Mono · body / log · 14px · 1.65</div>
  <p>Fenra descends three flights of the staircase before she realizes it is the same flight. She turns around.</p>
  <p>A moth the size of a thumbnail drifts past her ear. She watches it leave.</p>
  <p class="dim">&gt; The moth remembers the shape of her lantern.</p>
</div>
</body>
</html>
